version: '3'

rpc:
  listen: tcp://127.0.0.1:6001

server:
  command: "php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8080"
  env:
    - APP_ENV: production

http:
  address: 0.0.0.0:8080
  middleware: [static, headers, gzip]
  static:
    dir: "public"
    forbid: [".php", ".htaccess"]
  pool:
    num_workers: 8
    max_jobs: 500
    supervisor:
      - name: http-worker
        max_worker_memory: 256
  headers:
    cors:
      allowed_origin: "*"
      allowed_headers: "*"
      allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

logs:
  mode: production
  channels:
    http:
      level: info
    server:
      level: info
