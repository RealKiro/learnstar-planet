# 学趣星球 - Docker Compose 部署配置
#
# 两种部署方式，无需 --profile 参数：
#
#   方式一（默认）：内置 MySQL + Redis
#     docker-compose up -d
#     → 启动 app + mysql + redis，开箱即用
#
#   方式二：外置数据库（已有 MySQL/MariaDB/PostgreSQL/SQLite）
#     1. 在 .env 中修改 DB_HOST 指向外部数据库
#     2. docker-compose up -d app --no-deps
#     → 只启动 app，跳过内置 mysql/redis
#
# 端口说明：
#   容器内部 Nginx 固定监听 8080，不可改
#   APP_PORT 是宿主机访问端口，可自由修改
#   访问地址：http://你的服务器IP:<APP_PORT>
#
# 反向代理说明（Cloudflare Tunnel / Nginx / Traefik 等）：
#   APP_HOST + APP_PORT 仅用于 docker-compose 端口映射
#   APP_URL 是 Laravel 生成绝对 URL 用的，需单独配置
#   示例：Cloudflare Tunnel 将 https://learnstar.example.com → localhost:6900
#     APP_HOST=learnstar.example.com
#     APP_PORT=6900
#     APP_URL=https://learnstar.example.com

version: '3.8'

services:
  # ===== 应用服务 =====
  app:
    image: ghcr.io/${GITHUB_USERNAME:-realkiro}/learnstar-planet/backend:latest
    container_name: learnstar-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # 基础配置
      - APP_NAME=${APP_NAME:-学趣星球}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://${APP_HOST:-localhost}:${APP_PORT:-8080}}

      # 数据库配置（在 .env 中修改 DB_HOST 可切换到外部数据库）
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-learnstar}
      - DB_USERNAME=${DB_USERNAME:-learnstar}
      - DB_PASSWORD=${DB_PASSWORD:-learnstar_password}

      # Redis 配置（在 .env 中修改 REDIS_HOST 可切换到外部 Redis）
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # 缓存配置
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}

      # AI 功能配置（可选）
      - AI_PROVIDER=${AI_PROVIDER:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_API_BASE=${AI_API_BASE:-}
      - AI_MODEL=${AI_MODEL:-qwen-turbo}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2000}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}

      # 第三方登录配置（可选）
      - WECHAT_OFFICIAL_APPID=${WECHAT_OFFICIAL_APPID:-}
      - WECHAT_OFFICIAL_SECRET=${WECHAT_OFFICIAL_SECRET:-}
      - WECHAT_WORK_CORPID=${WECHAT_WORK_CORPID:-}
      - WECHAT_WORK_AGENTID=${WECHAT_WORK_AGENTID:-}
      - WECHAT_WORK_SECRET=${WECHAT_WORK_SECRET:-}
      - QQ_APPID=${QQ_APPID:-}
      - QQ_APPSECRET=${QQ_APPSECRET:-}
      - RENREN_CLIENT_ID=${RENREN_CLIENT_ID:-}
      - RENREN_CLIENT_SECRET=${RENREN_CLIENT_SECRET:-}

      # 超级管理员配置（首次部署自动创建，生产环境请务必修改密码）
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - ADMIN_NAME=${ADMIN_NAME:-系统管理员}
      - ADMIN_SCHOOL_NAME=${ADMIN_SCHOOL_NAME:-学趣星球默认学校}
      - ADMIN_SCHOOL_CODE=${ADMIN_SCHOOL_CODE:-learnstar-default}
    volumes:
      - app-uploads:/var/www/html/storage/app/uploads
      - app-logs:/var/www/html/storage/logs
    # depends_on 确保内置 MySQL/Redis 就绪后再启动 app
    # 使用外部数据库时加 --no-deps 跳过此依赖
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learnstar-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== 内置 MySQL 数据库 =====
  # 默认随 docker-compose up -d 一起启动
  # 使用外部数据库时：docker-compose up -d app --no-deps（跳过此服务）
  mysql:
    image: mysql:8.0
    container_name: learnstar-mysql
    restart: unless-stopped
    environment:
      # MySQL root 超管密码（仅用于数据库维护/备份，Laravel 不读取此变量）
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_strong_password}
      # 首次启动自动创建数据库和业务账号（Laravel 应用使用）
      MYSQL_DATABASE: ${DB_DATABASE:-learnstar}
      MYSQL_USER: ${DB_USERNAME:-learnstar}
      MYSQL_PASSWORD: ${DB_PASSWORD:-learnstar_password}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      # 宿主机端口 : 容器内部端口
      # 左边：MYSQL_PORT，供 Navicat/DBeaver 等外部工具连接
      # 右边：固定 3306，Laravel 通过 DB_PORT=3306 在容器内部连接
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - learnstar-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== 内置 Redis 缓存 =====
  # 默认随 docker-compose up -d 一起启动
  # 使用外部 Redis 时：docker-compose up -d app --no-deps（跳过此服务）
  redis:
    image: redis:7-alpine
    container_name: learnstar-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - learnstar-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  learnstar-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  app-uploads:
  app-logs:
