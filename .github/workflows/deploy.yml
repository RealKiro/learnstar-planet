name: Deploy to Production

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # ========== 部署到预发布环境 ==========
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.STAGING_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ STAGING_HOST not configured, skipping deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Staging Server
        if: steps.check-secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/learnstar/staging
            git pull origin develop
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose exec -T app php artisan migrate --force
            docker-compose exec -T app php artisan config:clear
            docker-compose exec -T app php artisan cache:clear

      - name: Health check
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          sleep 10
          curl -f https://staging.learnstar.com/api/health || exit 1

      - name: Notify deployment status
        if: always() && steps.check-secrets.outputs.skip != 'true' && secrets.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'

      - name: Skip notice
        if: steps.check-secrets.outputs.skip == 'true'
        run: echo "ℹ️ Staging deployment skipped — configure STAGING_HOST/STAGING_USER/STAGING_SSH_KEY secrets to enable."

  # ========== 部署到生产环境 ==========
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))
    environment: production
    needs: [deploy-staging]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.PROD_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ PROD_HOST not configured, skipping deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Tag
        if: steps.check-secrets.outputs.skip != 'true' && startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Deploy to Production Server
        if: steps.check-secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/learnstar/production
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose exec -T app php artisan migrate --force
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache

      - name: Health check
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          sleep 15
          curl -f https://learnstar.com/api/health || exit 1

      - name: Verify deployment
        if: steps.check-secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker-compose ps
            docker-compose exec -T app php artisan health:check

      - name: Notify deployment status
        if: always() && steps.check-secrets.outputs.skip != 'true' && secrets.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'

      - name: Skip notice
        if: steps.check-secrets.outputs.skip == 'true'
        run: echo "ℹ️ Production deployment skipped — configure PROD_HOST/PROD_USER/PROD_SSH_KEY secrets to enable."

  # ========== 回滚机制 ==========
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-production]

    steps:
      - name: Check production secrets
        id: check-prod
        run: |
          if [ -z "${{ secrets.PROD_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "ℹ️ PROD_HOST not configured, skipping rollback"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Rollback to previous version
        if: steps.check-prod.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/learnstar/production
            git revert --no-edit HEAD
            docker-compose up -d --remove-orphans
            docker-compose exec -T app php artisan migrate --force

      - name: Notify rollback
        if: always() && steps.check-prod.outputs.skip != 'true' && secrets.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: 8398a7/action-slack@v3
        with:
          status: 'warning'
          text: 'Production deployment rolled back'

      - name: Skip notice
        if: steps.check-prod.outputs.skip == 'true'
        run: echo "ℹ️ Rollback skipped — PROD_HOST not configured."
