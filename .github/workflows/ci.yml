name: CI - Test & Lint

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ========== 后端测试（Laravel/PHP）==========
  backend-test:
    name: Backend Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.3]
        database: [mysql, pgsql, sqlite]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: learnstar_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      pgsql:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: learnstar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, pdo_pgsql, redis, gd, zip, bz2
          coverage: xdebug

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Create storage directories
        working-directory: backend
        run: |
          mkdir -p storage/app/public \
            storage/framework/cache/data \
            storage/framework/sessions \
            storage/framework/views \
            storage/logs \
            bootstrap/cache

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate --no-interaction

      - name: Setup database (MySQL)
        if: matrix.database == 'mysql'
        working-directory: backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: learnstar_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Setup database (PostgreSQL)
        if: matrix.database == 'pgsql'
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: learnstar_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan migrate --force

      - name: Setup database (SQLite)
        if: matrix.database == 'sqlite'
        working-directory: backend
        run: |
          touch database/testing.sqlite
          php artisan migrate --force --database=sqlite

      - name: Run PHPUnit tests
        working-directory: backend
        env:
          DB_CONNECTION: ${{ matrix.database == 'mysql' && 'mysql' || matrix.database == 'pgsql' && 'pgsql' || 'sqlite' }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.database == 'mysql' && '3306' || matrix.database == 'pgsql' && '5432' || '' }}
          DB_DATABASE: ${{ matrix.database == 'sqlite' && 'database/testing.sqlite' || 'learnstar_test' }}
          DB_USERNAME: ${{ matrix.database == 'pgsql' && 'postgres' || 'root' }}
          DB_PASSWORD: ${{ matrix.database == 'pgsql' && 'postgres' || 'root' }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: ./vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3' && matrix.database == 'mysql'
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ========== 代码质量检查 ==========
  code-quality:
    name: Code Quality (PHP CS Fixer + PHPStan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, ctype, iconv, intl, gd, zip, bz2
          tools: php-cs-fixer, phpstan

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run PHP CS Fixer (check only)
        working-directory: backend
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run PHPStan (static analysis)
        working-directory: backend
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

  # ========== 前端检查（单文件 HTML 项目，无 npm 构建）==========
  frontend-test:
    name: Frontend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          test -f index.html && echo "✅ index.html exists" || (echo "❌ index.html missing" && exit 1)

      - name: Validate HTML syntax (basic)
        run: |
          # 检查基础 HTML 结构标签
          grep -q "<!DOCTYPE html>" index.html && echo "✅ DOCTYPE found"
          grep -q "<html" index.html && echo "✅ <html> tag found"
          grep -q "</html>" index.html && echo "✅ </html> tag found"
          grep -q "<head>" index.html && echo "✅ <head> found"
          grep -q "<body" index.html && echo "✅ <body> found"
          echo "HTML structure validation passed"

      - name: Check for broken script tags
        run: |
          # 确认没有未闭合的 script 块
          OPEN=$(grep -c "<script" index.html || true)
          CLOSE=$(grep -c "</script>" index.html || true)
          echo "Script tags: open=$OPEN close=$CLOSE"
          [ "$OPEN" -eq "$CLOSE" ] && echo "✅ Script tags balanced" || (echo "❌ Unbalanced script tags" && exit 1)

  # ========== 微信小程序检查 ==========
  miniprogram-lint:
    name: WeChat Mini Program Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate mini-program JSON files
        run: |
          echo "Validating mini-program config files..."
          cat mini-program/app.json | jq . > /dev/null && echo "✅ app.json is valid JSON"
          cat mini-program/project.config.json | jq . > /dev/null && echo "✅ project.config.json is valid JSON"
          echo "Mini-program structure validation passed"

      - name: Check mini-program file structure
        run: |
          test -f mini-program/app.js && echo "✅ app.js exists"
          test -f mini-program/app.json && echo "✅ app.json exists"
          test -f mini-program/app.wxss && echo "✅ app.wxss exists"
          test -d mini-program/pages && echo "✅ pages directory exists"
          echo "Mini-program file structure validation passed"
